services:
  db:
    image: mysql:8.4
    container_name: monster-hunting-board-db
    environment:
      MYSQL_DATABASE: monster_hunting_board
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp_user", "-papp_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monster-hunting-board-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/monster_hunting_board
      DB_USER: app_user
      DB_PASSWORD: app_password
      JWT_SECRET: replace-this-in-production-with-a-long-secret
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  mysql-data:
