spring.application.name=monster-hunting-board

# DATABASE (env-backed)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/monster_hunting_board}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL init
spring.sql.init.mode=always

# MVC (legacy matching, ok to keep)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# SECURITY
jwt.secret=${JWT_SECRET:temporary-dev-secret-change-me-this-should-be-long}
jwt.expiration=86400000

# SERVER
server.port=${SERVER_PORT:8080}
