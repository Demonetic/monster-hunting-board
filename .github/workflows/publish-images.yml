name: Publish Docker Images
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/demonetic/monster-hunter-board-backend:latest
            ghcr.io/demonetic/monster-hunter-board-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/demonetic/monster-hunter-board-frontend:latest
            ghcr.io/demonetic/monster-hunter-board-frontend:${{ github.sha }}
